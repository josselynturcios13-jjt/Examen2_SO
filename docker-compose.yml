version: '3.8'
services:
  web:
    build: .
    ports:
      - "80:80"
    networks:
      - fithub-net
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password123
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fithub-net

networks:
  fithub-net:
    driver: bridge
volumes:
  db_data: